name: Atualizar fundamentos B3

on:
  # Toda segunda-feira às 9h UTC = 6h Brasil
  # Roda DEPOIS do cron-screening do Vercel (que é diário às 6h UTC)
  schedule:
    - cron: "0 9 * * 1"

  workflow_dispatch:

concurrency:
  group: cron-fundamentos
  cancel-in-progress: true

jobs:
  fundamentos:
    name: Chunk offset ${{ matrix.offset }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    # Estratégia: 10 chunks de 100 tickers cada (cobre os 1000 mais líquidos).
    # 100 tickers em paralelismo 20 = 5 batches × ~3-15s = ~15-75s
    # Mais defensivo: se a bolsai estiver lenta (timeout 20s), cabe em 50s.
    #
    # Por que parar em offset=900 (e não cobrir 1000+):
    # - A bolsai cobre ~750 tickers úteis (ações + FIIs com fundamentos).
    # - Acima do offset ~800 começa zona morta (units obscuras, ETFs sem
    #   fundamentos na bolsai).
    strategy:
      fail-fast: false
      max-parallel: 5  # GitHub Actions limita pra evitar abuso da bolsai
      matrix:
        offset: [0, 100, 200, 300, 400, 500, 600, 700, 800, 900]

    steps:
      - name: Disparar chunk
        run: |
          echo "Disparando chunk offset=${{ matrix.offset }}, limit=100..."
          response=$(curl -sS -w "\n%{http_code}" --max-time 90 -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://invent-ia.vercel.app/api/cron-fundamentos?offset=${{ matrix.offset }}&limit=100")
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "Status HTTP: $status"
          echo "Resposta: $body"
          if [ "$status" != "200" ]; then
            echo "::error::Chunk offset=${{ matrix.offset }} falhou (status $status)"
            exit 1
          fi
