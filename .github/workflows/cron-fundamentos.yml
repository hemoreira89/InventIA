name: Atualizar fundamentos B3

on:
  # Toda segunda-feira às 9h UTC = 6h Brasil
  # Roda DEPOIS do cron-screening do Vercel (que é diário às 6h UTC)
  schedule:
    - cron: "0 9 * * 1"

  workflow_dispatch:

concurrency:
  group: cron-fundamentos
  cancel-in-progress: true

jobs:
  fundamentos:
    name: Chunk offset ${{ matrix.offset }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    # Estratégia: 7 chunks de 200 tickers cada.
    # 200 tickers × 2 reqs (fundamentals + companies) = 400 reqs paralelas
    # Em paralelismo 50 = 8 batches sequenciais × ~3s = ~25s total
    # Cabe folgado nos 60s de timeout do Vercel Hobby.
    # 7 chunks × 200 = 1400 tickers cobertos (mais que o catálogo todo).
    strategy:
      fail-fast: false
      matrix:
        offset: [0, 200, 400, 600, 800, 1000, 1200]

    steps:
      - name: Disparar chunk
        run: |
          echo "Disparando chunk offset=${{ matrix.offset }}, limit=200..."
          response=$(curl -sS -w "\n%{http_code}" --max-time 90 -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://invent-ia.vercel.app/api/cron-fundamentos?offset=${{ matrix.offset }}&limit=200")
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "Status HTTP: $status"
          echo "Resposta: $body"
          if [ "$status" != "200" ]; then
            echo "::error::Chunk offset=${{ matrix.offset }} falhou (status $status)"
            exit 1
          fi
