name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Roda diariamente às 12:00 UTC (9:00 BRT) para verificar saúde
    - cron: '0 12 * * *'

jobs:
  unit-tests:
    name: Testes Unitários
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Rodar testes unitários
        run: npm test

      - name: Coverage report
        run: npm run test:coverage
        continue-on-error: true

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  build:
    name: Build de Produção
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verificar tamanho do bundle
        run: |
          BUNDLE_SIZE=$(du -sh dist/assets/index-*.js | cut -f1)
          echo "Bundle size: $BUNDLE_SIZE"
          echo "::notice::Bundle gerado: $BUNDLE_SIZE"

  smoke-tests:
    name: Smoke Tests (Produção)
    runs-on: ubuntu-latest
    # Roda após push (Vercel deploy) e em schedule
    if: github.event_name == 'push' || github.event_name == 'schedule'
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Aguardar deploy do Vercel
        if: github.event_name == 'push'
        run: |
          echo "Aguardando 90s para o Vercel terminar o deploy..."
          sleep 90

      - name: Rodar smoke tests
        run: npm run test:smoke
        env:
          SITE_URL: https://invent-ia.vercel.app

  e2e-tests:
    name: Testes E2E (Playwright)
    runs-on: ubuntu-latest
    needs: smoke-tests
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Instalar browsers do Playwright
        run: npx playwright install --with-deps chromium

      - name: Rodar testes E2E
        run: npx playwright test
        env:
          BASE_URL: https://invent-ia.vercel.app
          E2E_USER: ${{ secrets.E2E_USER }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload screenshots de falhas
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-failures
          path: test-results/
          retention-days: 7
