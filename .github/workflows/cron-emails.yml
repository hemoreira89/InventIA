name: Ciclo de email de trial

# 1x/dia, 13h UTC = 10h Brasil (bom horário de abertura de email).
# Dormente até as envs de SMTP estarem configuradas no Vercel — o endpoint
# simplesmente responde { skipped } enquanto não houver SMTP.
on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      preview_email:
        description: "Enviar TODOS os templates p/ este email (validação). Vazio = envio normal."
        required: false
        default: ""

concurrency:
  group: cron-emails
  cancel-in-progress: true

jobs:
  emails:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Disparar ciclo de email
        run: |
          URL="https://invent-ia.vercel.app/api/cron-emails"
          if [ -n "${{ github.event.inputs.preview_email }}" ]; then
            URL="${URL}?preview=${{ github.event.inputs.preview_email }}"
          fi
          response=$(curl -sS -w "\n%{http_code}" --max-time 90 -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "$URL")
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "Status HTTP: $status"
          echo "Resposta: $body"
          if [ "$status" != "200" ]; then
            echo "::error::cron-emails falhou (status $status)"
            exit 1
          fi
